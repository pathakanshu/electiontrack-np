<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nepal Election Tracker — Live Results & Interactive Map</title>

    <!-- General meta -->
    <meta
      name="description"
      content="Track Nepal's election results live with an interactive constituency map, party leaderboards, FPTP & PR data, and deep statistical analysis. Data sourced from the Election Commission of Nepal."
    />
    <meta name="author" content="Anshu Pathak" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="color-scheme" content="dark light" />

    <!-- Open Graph (Facebook, LinkedIn, Discord, iMessage, WhatsApp, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://election.pathakanshu.com" />
    <meta property="og:title" content="Nepal Election Tracker" />
    <meta
      property="og:description"
      content="Live election results with an interactive constituency map, party leaderboards, and deep statistical analysis. Data from Election Commission of Nepal."
    />
    <meta
      property="og:image"
      content="https://election.pathakanshu.com/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Nepal Election Tracker — Live results, interactive map, constituency data"
    />
    <meta property="og:site_name" content="Nepal Election Tracker" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nepal Election Tracker" />
    <meta
      name="twitter:description"
      content="Live election results with an interactive constituency map, party leaderboards, and deep statistical analysis."
    />
    <meta
      name="twitter:image"
      content="https://election.pathakanshu.com/og-image.png"
    />
    <meta
      name="twitter:image:alt"
      content="Nepal Election Tracker — Live results, interactive map, constituency data"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/og-image.png" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://election.pathakanshu.com" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Noto+Serif+Devanagari:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@5.15.0/dist/maplibre-gl.css"
    />
    <script>
      // Apply saved theme (or OS preference) before first paint to prevent flash.
      (function () {
        var stored = localStorage.getItem('theme');
        var theme =
          stored === 'dark' || stored === 'light'
            ? stored
            : window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
